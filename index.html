  <style>
    :root {
      --wasabi: #7B8B6F;
      --dark-brown: #2C2421;
      --gold: #B8956A;
      --off-white: #F7F3EF;
      --off-white-warm: #F0EBE4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color-scheme: light only;
      background-color: #F7F3EF;
    }

    body {
      background-color: var(--off-white);
      color: var(--dark-brown);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
    }

    /* Decorative gold accent line */
    .accent-line {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      animation: lineGrow 2s ease-out 0.5s forwards;
      z-index: 1;
    }

    @keyframes lineGrow {
      to { height: 80px; }
    }

    /* Bottom accent line */
    .accent-line-bottom {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 0;
      background: linear-gradient(to top, transparent, var(--gold), transparent);
      animation: lineGrow 2s ease-out 0.8s forwards;
      z-index: 1;
    }

    /* Main content */
    .container {
      text-align: center;
      padding: 2rem;
      opacity: 0;
      animation: fadeIn 1.8s ease-out 0.3s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Logo image */
    .logo-image {
      width: clamp(180px, 35vw, 280px);
      height: auto;
      display: block;
      margin: 0 auto 2.5rem;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 1.6s ease-out 0.6s forwards;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Decorative separator */
    .separator {
      width: 40px;
      height: 1px;
      background-color: var(--gold);
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeIn 1.6s ease-out 1.2s forwards;
    }

    /* Brand philosophy */
    .philosophy {
      font-family: 'Noto Serif JP', serif;
      font-weight: 200;
      font-size: clamp(0.8rem, 2.2vw, 1.05rem);
      color: var(--dark-brown);
      letter-spacing: 0.12em;
      line-height: 2.2;
      margin-bottom: 3rem;
      opacity: 0;
      transform: translateY(10px);
      animation: slideUp 1.4s ease-out 1.4s forwards;
    }

    /* Opening info */
    .opening-info {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.55rem, 1.5vw, 0.72rem);
      letter-spacing: 0.25em;
      color: var(--wasabi);
      margin-bottom: 0.6rem;
      opacity: 0;
      animation: fadeIn 1.4s ease-out 1.7s forwards;
    }

    .opening-location {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: clamp(0.65rem, 1.6vw, 0.78rem);
      letter-spacing: 0.15em;
      color: var(--dark-brown);
      opacity: 0.6;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeIn 1.4s ease-out 1.9s forwards;
    }

    /* Instagram link */
    .instagram-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--dark-brown);
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.6rem, 1.4vw, 0.72rem);
      letter-spacing: 0.2em;
      padding: 0.8rem 2rem;
      border: 1px solid var(--gold);
      transition: all 0.5s ease;
      opacity: 0;
      animation: fadeIn 1.4s ease-out 2.2s forwards;
    }

    .instagram-link:hover {
      background-color: var(--gold);
      color: var(--off-white);
      border-color: var(--gold);
    }

    .instagram-link svg {
      width: 14px;
      height: 14px;
      transition: transform 0.4s ease;
    }

    .instagram-link:hover svg {
      transform: scale(1.1);
    }

    /* Wasabi accent corners */
    .corner {
      position: fixed;
      width: 30px;
      height: 30px;
      opacity: 0;
      animation: fadeIn 2s ease-out 2.5s forwards;
    }

    .corner--tl {
      top: 24px;
      left: 24px;
      border-top: 1px solid var(--wasabi);
      border-left: 1px solid var(--wasabi);
    }

    .corner--tr {
      top: 24px;
      right: 24px;
      border-top: 1px solid var(--wasabi);
      border-right: 1px solid var(--wasabi);
    }

    .corner--bl {
      bottom: 24px;
      left: 24px;
      border-bottom: 1px solid var(--wasabi);
      border-left: 1px solid var(--wasabi);
    }

    .corner--br {
      bottom: 24px;
      right: 24px;
      border-bottom: 1px solid var(--wasabi);
      border-right: 1px solid var(--wasabi);
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
      }

      .philosophy {
        line-height: 2.4;
        letter-spacing: 0.08em;
      }

      .corner {
        width: 20px;
        height: 20px;
      }

      .corner--tl, .corner--tr { top: 16px; }
      .corner--bl, .corner--br { bottom: 16px; }
      .corner--tl, .corner--bl { left: 16px; }
      .corner--tr, .corner--br { right: 16px; }
    }
  </style>

<body>

  <div class="accent-line"></div>
  <div class="accent-line-bottom"></div>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="container">
    <h1 style="position:absolute;left:-9999px;">Grace Patisserie</h1>
    <img src="logo-vertical.png" alt="Grace Patisserie" class="logo-image">

    <div class="separator"></div>

    <p class="philosophy">美しい暮らしには、お菓子がある。</p>

    <p class="opening-info">AUTUMN 2026 — OPEN</p>
    <p class="opening-location">愛知・春日井</p>

        <circle cx="12" cy="12" r="5"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
      INSTAGRAM
    </a>
  </div>
